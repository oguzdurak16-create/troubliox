image: node:22-alpine

stages:
  - verify

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/
    - .next/cache/

verify:
  stage: verify
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.13.1 --activate
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm install --frozen-lockfile
    - pnpm validate:content
    - pnpm typecheck
    - pnpm build
  rules:
    - if: $CI_COMMIT_BRANCH
