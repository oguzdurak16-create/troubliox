name: Troublio CI

on:
  push:
    branches:
      - main
      - "dev/**"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit repository structure
        id: repository_audit
        continue-on-error: true
        run: pnpm audit:repo > audit-report.txt 2>&1
      - name: Upload repository audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-audit
          path: audit-report.txt
          if-no-files-found: error
      - name: Enforce repository audit
        if: steps.repository_audit.outcome == 'failure'
        run: cat audit-report.txt && exit 1
      - name: Validate content
        run: pnpm validate:content
      - name: Typecheck
        run: pnpm typecheck
      - name: Production build
        run: pnpm build
