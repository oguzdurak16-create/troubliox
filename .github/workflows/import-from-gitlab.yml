name: Apply Troublio update patch

on:
  push:
    branches: [main]
    paths:
      - '.github/troublio-v1.5.0-patch.zip.b64'
      - '.github/workflows/import-from-gitlab.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect update patch
        id: patch
        shell: bash
        run: |
          if [ -f .github/troublio-v1.5.0-patch.zip.b64 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No update patch is present."
          fi

      - name: Decode update patch
        if: steps.patch.outputs.exists == 'true'
        shell: bash
        run: |
          base64 --decode .github/troublio-v1.5.0-patch.zip.b64 > /tmp/troublio-v1.5.0-patch.zip

      - name: Apply project files
        if: steps.patch.outputs.exists == 'true'
        shell: bash
        run: |
          unzip -qo /tmp/troublio-v1.5.0-patch.zip -d .
          rm -f .github/troublio-v1.5.0-patch.zip.b64

      - name: Commit Troublio update
        if: steps.patch.outputs.exists == 'true'
        shell: bash
        run: |
          git config user.name "oguzdurak16"
          git config user.email "oguzdurak16@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No project changes detected."
            exit 0
          fi
          git commit -m "Release Troublio v1.5.0 decoder and model tools"
          git push origin main
